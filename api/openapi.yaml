openapi: 3.1.0
info:
  title: ccx local API
  version: 0.1.0
  description: |
    Local HTTP API served by `ccx dashboard`. Always bound to 127.0.0.1.
    No authentication (localhost-only). All endpoints return JSON unless noted.

servers:
  - url: http://127.0.0.1:7777
    description: Default local server

security: []

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required: [ok, version]
                properties:
                  ok:      { type: boolean }
                  version: { type: string  }

  /api/profiles:
    get:
      summary: List all registered profiles with today's totals
      operationId: listProfiles
      responses:
        "200":
          description: A list of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileWithTotals"

  /api/usage:
    get:
      summary: Aggregated usage rows
      operationId: getUsage
      parameters:
        - in: query
          name: profile
          schema: { type: string }
          description: Filter to one profile. Omit for all.
        - in: query
          name: project
          schema: { type: string }
          description: Filter to one project. Omit for all.
        - in: query
          name: since
          schema: { type: string }
          description: Duration string like "24h", "7d", "30d". Default "24h".
      responses:
        "200":
          description: Aggregated usage rows
          content:
            application/json:
              schema:
                type: object
                required: [rows, total]
                properties:
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/UsageRow"
                  total:
                    $ref: "#/components/schemas/UsageTotal"

  /api/usage/live:
    get:
      summary: Server-Sent Events stream of usage updates
      operationId: getUsageLive
      description: |
        Emits a `usage` event whenever a watched JSONL file changes.
        The data payload is a JSON-encoded UsageRow array.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/daemon/status:
    get:
      summary: Daemon runtime status
      operationId: getDaemonStatus
      responses:
        "200":
          description: Current daemon or foreground dashboard status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaemonStatus"

  /api/hooks/status:
    get:
      summary: Hook installation status
      operationId: getHooksStatus
      parameters:
        - in: query
          name: profile
          schema: { type: string }
          description: Filter to one profile. Omit for all.
      responses:
        "200":
          description: Per-profile hook status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HookStatus"

  /api/sessions:
    get:
      summary: Recent session telemetry
      operationId: getSessions
      parameters:
        - in: query
          name: profile
          schema: { type: string }
          description: Filter to one profile. Omit for all.
        - in: query
          name: status
          schema: { type: string }
          description: Filter by session status.
        - in: query
          name: since
          schema: { type: string }
          description: Duration string like "24h", "7d", "30d". Omit for no time filter; default limit/newest-first applies.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
          description: Maximum sessions to return. Default 50.
      responses:
        "200":
          description: Recent sessions, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionTelemetry"

  /api/headroom:
    get:
      summary: Profile headroom recommendation
      operationId: getHeadroom
      responses:
        "200":
          description: Recommendation and ranked candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeadroomResponse"

components:
  schemas:
    Profile:
      type: object
      required: [name, config_dir, created_at, last_used_at]
      properties:
        name:         { type: string }
        config_dir:   { type: string }
        label:        { type: string }
        color:        { type: string }
        created_at:   { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }

    ProfileWithTotals:
      allOf:
        - $ref: "#/components/schemas/Profile"
        - type: object
          required: [today]
          properties:
            today:
              $ref: "#/components/schemas/UsageTotal"

    Usage:
      type: object
      required: [input_tokens, output_tokens, cache_read_tokens, cache_create_tokens]
      properties:
        input_tokens:        { type: integer }
        output_tokens:       { type: integer }
        cache_read_tokens:   { type: integer }
        cache_create_tokens: { type: integer }

    UsageRow:
      type: object
      required: [profile, day, usage, session_count, estimated_usd]
      properties:
        profile:        { type: string }
        project:        { type: string }
        model:          { type: string }
        day:            { type: string, format: date-time }
        usage:          { $ref: "#/components/schemas/Usage" }
        session_count:  { type: integer }
        estimated_usd:  { type: number, format: double }

    UsageTotal:
      type: object
      required: [usage, estimated_usd]
      properties:
        usage:          { $ref: "#/components/schemas/Usage" }
        estimated_usd:  { type: number, format: double }

    DaemonStatus:
      type: object
      required: [mode, status, version, running]
      properties:
        mode:
          type: string
          enum: [daemon, foreground, offline]
        status:
          type: string
          enum: [running, offline, starting]
        pid:              { type: integer }
        version:          { type: string }
        started_at:       { type: string, format: date-time }
        port:             { type: integer }
        url:              { type: string }
        db_path:          { type: string }
        log_path:         { type: string }
        executable_path:  { type: string }
        profiles_watched: { type: integer }
        running:          { type: boolean }

    HookStatus:
      type: object
      required: [profile, installed, status, disabled, settings_path]
      properties:
        profile:       { type: string }
        installed:     { type: boolean }
        status:
          type: string
          enum: [missing, invalid, partial, disabled, installed]
        disabled:      { type: boolean }
        settings_path: { type: string }
        backup_path:   { type: string }
        message:       { type: string }
        error:         { type: string }

    SessionTelemetry:
      type: object
      required:
        - profile
        - session
        - transcript
        - cwd
        - model
        - source
        - permission
        - started_at
        - ended_at
        - last_seen_at
        - status
        - end_reason
        - failure_error
        - failure_details
        - compact_count
      properties:
        profile:         { type: string }
        session:         { type: string }
        transcript:      { type: string }
        cwd:             { type: string }
        model:           { type: string }
        source:          { type: string }
        permission:      { type: string }
        started_at:      { type: string, format: date-time }
        ended_at:        { type: string, format: date-time }
        last_seen_at:    { type: string, format: date-time }
        status:          { type: string }
        end_reason:      { type: string }
        failure_error:   { type: string }
        failure_details: { type: string }
        compact_count:   { type: integer }

    HeadroomCandidate:
      type: object
      required:
        - profile
        - available
        - score
        - headroom_percent
        - auth_status
        - reasons
        - priority
        - tokens_24h
        - tokens_7d
        - usd_30d
      properties:
        profile:          { type: string }
        available:        { type: boolean }
        score:            { type: number, format: double }
        headroom_percent: { type: number, format: double }
        auth_status:      { type: string }
        cooldown_until:   { type: string, format: date-time }
        reasons:
          type: array
          items: { type: string }
        priority:         { type: integer }
        tokens_24h:       { type: integer }
        tokens_7d:        { type: integer }
        usd_30d:          { type: number, format: double }

    HeadroomResponse:
      type: object
      required: [candidates]
      properties:
        recommendation:
          $ref: "#/components/schemas/HeadroomCandidate"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/HeadroomCandidate"
        error:
          type: string
