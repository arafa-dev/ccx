name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-22.04
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
              - ".golangci.yml"
              - ".github/workflows/ci.yml"
              - "api/openapi.yaml"
            web:
              - "web/**"
              - "api/openapi.yaml"
              - ".github/workflows/ci.yml"

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.7.0
      - name: Check formatting
        run: |
          DIFF=$(gofumpt -l .)
          if [ -n "$DIFF" ]; then
            echo "::error::Files not formatted with gofumpt:"
            echo "$DIFF"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
      - name: Test
        run: go test -race -count=1 ./...

  build:
    name: Build (${{ matrix.os }})
    needs: [changes, test]
    if: needs.changes.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
      - name: Build
        # cmd/ccx may not exist yet during Phase 0; tolerate missing main.
        run: |
          if [ -d cmd/ccx ]; then
            go build -trimpath -o /tmp/ccx ./cmd/ccx
          else
            echo "cmd/ccx not present yet; skipping binary build"
          fi
        shell: bash

  web:
    name: Web (lint + test + build)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --filter web install --frozen-lockfile
      - name: Check API types
        run: pnpm --filter web exec bash scripts/check-api-types.sh
      - name: Lint
        run: pnpm --filter web lint
      - name: Typecheck
        run: pnpm --filter web typecheck
      - name: Unit tests
        run: pnpm --filter web test
      - name: Build static export
        run: pnpm --filter web build
