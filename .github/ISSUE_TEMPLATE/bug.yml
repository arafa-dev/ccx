name: Bug report
description: Something isn't working as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear, terse description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        The minimum commands or actions needed.
      placeholder: |
        1. ccx profile add work --config-dir ...
        2. eval "$(ccx use work)"
        3. ccx usage
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `ccx doctor`
      render: shell
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Output of `ccx version`
      render: shell
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (amd64)
        - Linux (arm64)
        - Windows
    validations:
      required: true
